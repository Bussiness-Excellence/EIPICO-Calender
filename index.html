<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EIPICO Excellence Portal</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
:root { --primary: #0C3D7A; --accent: #1D5FA8; --bg: #F8FAFC; --card: #FFFFFF; --text: #0F172A; --text-light: #64748B; --border: #E2E8F0; --radius: 16px; }
body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); }
.glass { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 20px; }
.kpi-card { padding: 20px; display: flex; align-items: center; gap: 15px; }
.kpi-icon { background: #EBF3FB; color: var(--primary); padding: 12px; border-radius: 12px; font-size: 24px; }
.kpi-val { font-size: 24px; font-weight: 700; }
.kpi-lbl { font-size: 12px; color: var(--text-light); text-transform: uppercase; }
</style>
</head>
<body>

<!-- Modern KPI Dashboard -->
<div class="kpi-grid">
  <div class="glass kpi-card">
    <div class="kpi-icon"><i class="ti ti-target"></i></div>
    <div>
      <div class="kpi-lbl">Total Events</div>
      <div class="kpi-val" id="kpiTotalEvents">0</div>
    </div>
  </div>
  <div class="glass kpi-card">
    <div class="kpi-icon"><i class="ti ti-chart-bar"></i></div>
    <div>
      <div class="kpi-lbl">Urgent Tasks</div>
      <div class="kpi-val" id="kpiUrgent">0</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// Supabase Configuration
const _supabase = supabase.createClient('https://xxbfwvlqixnmonxytdxq.supabase.co', 'sb_publishable_EmW0iOc7qMdpEtGdKbjRgQ_-ETHGD2m');

// Update KPIs dynamically based on data
async function updateKPIs() {
  const { data: events } = await _supabase.from('events').select('*');
  if (events) {
    document.getElementById('kpiTotalEvents').textContent = events.length;
    document.getElementById('kpiUrgent').textContent = events.filter(e => e.priority === 'urgent').length;
  }
}

// Ensure you call updateKPIs() whenever you load or add events
// ... (your existing loadEventsDB() and saveEvent() logic goes here)
</script>
</body>
</html>
